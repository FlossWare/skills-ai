name: Auto Release (X.Y Versioning)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-version-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current_version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump minor version (X.Y)
        id: bump_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping from $CURRENT to $NEW_VERSION"

      - name: Update version in files
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          echo "$NEW_VERSION" > VERSION
          echo "Updated to version $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push

      - name: Create Git tag
        run: |
          git tag -a "v${{ steps.bump_version.outputs.new_version }}" -m "Release v${{ steps.bump_version.outputs.new_version }}"
          git push origin "v${{ steps.bump_version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          release_name: Skills AI v${{ steps.bump_version.outputs.new_version }}
          body: |
            ## Skills AI v${{ steps.bump_version.outputs.new_version }}

            **X.Y Versioning:** Every merge to main is a release candidate.

            ### What's New
            See commit history for changes since last release.

            ### Installation
            ```bash
            git clone https://github.com/FlossWare/skills-ai.git
            cd skills-ai
            git checkout v${{ steps.bump_version.outputs.new_version }}
            ```

            ### Skills Included
            - consensus-chat - Interactive AI chat with visual indicators
          draft: false
          prerelease: false
